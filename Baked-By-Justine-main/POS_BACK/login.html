<!-- 
    Name: Abdullah Musani
    Date Created: April 20, 2026
    Description: Login page for the Bakes By Justine POS system. Renders a sign-in form,
                 submits credentials to the login API, and redirects to the dashboard on success.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Login | Bakes By Justine</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="flex min-h-screen items-center justify-center px-4 py-12 sm:px-6 lg:px-8 bg-[#FAFAF5]">
        <div class="w-full max-w-md space-y-8 rounded-xl bg-white p-10 shadow-lg border border-gray-100">
            <div class="text-center">
                <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-lg bg-[#4a3728]">
                    <i class="fa fa-shopping-basket text-white text-xl"></i>
                </div>
                <h2 class="mt-6 text-3xl font-bold tracking-tight text-gray-900">Sign in to your account</h2>
                <p class="mt-2 text-sm text-gray-600">Bakes By Justine POS System</p>
            </div>
            
            <div id="error-message" class="hidden rounded-md bg-red-50 p-4 text-sm text-red-700 border border-red-200"></div>

            <form id="loginForm" class="mt-8 space-y-6">
                <div class="-space-y-px rounded-md shadow-sm">
                    <div>
                        <label for="username" class="sr-only">Username</label>
                        <input id="username" name="username" type="text" required 
                            class="relative block w-full rounded-t-md border-0 py-2 px-3 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:z-10 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm" 
                            placeholder="Username">
                    </div>
                    <div>
                        <label for="password" class="sr-only">Password</label>
                        <input id="password" name="password" type="password" required 
                            class="relative block w-full rounded-b-md border-0 py-2 px-3 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:z-10 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm" 
                            placeholder="Password">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" 
                            class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-600">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-900">Remember me</label>
                    </div>
                    <div class="text-sm">
                        <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500">Forgot password?</a>
                    </div>
                </div>

                <button type="submit" id="submitBtn"
                    class="group relative flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-indigo-600 transition duration-150">
                    <span id="btnText">Sign in</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error-message');
        const btnText = document.getElementById('btnText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Feedback
            errorDiv.classList.add('hidden');
            btnText.textContent = 'Authenticating...';

            try {
                const formData = new FormData(loginForm);
                const response = await fetch('api/users/login.php', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // Redirect to the index.php dashboard
                    window.location.href = 'index.php';
                } else {
                    // Show error from login.php
                    errorDiv.textContent = result.error || 'An unknown error occurred.';
                    errorDiv.classList.remove('hidden');
                    btnText.textContent = 'Sign in';
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error. Please check your local server.';
                errorDiv.classList.remove('hidden');
                btnText.textContent = 'Sign in';
            }
        });
    </script>
</body>
</html>
